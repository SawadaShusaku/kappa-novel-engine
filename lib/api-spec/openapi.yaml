openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: novel
    description: Novel game engine operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /novel/chapters/{chapter}/lines:
    get:
      operationId: getChapterLines
      tags: [novel]
      summary: Get all script lines for a chapter
      parameters:
        - name: chapter
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of script lines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScriptLine"
  /novel/lines/{id}:
    get:
      operationId: getScriptLine
      tags: [novel]
      summary: Get a single script line by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A script line
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScriptLine"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ScriptLine:
      type: object
      properties:
        id:
          type: integer
        chapter:
          type: integer
          nullable: true
        sequence:
          type: integer
          nullable: true
        speakerId:
          type: integer
          nullable: true
        speakerName:
          type: string
          nullable: true
        bodyText:
          type: string
          nullable: true
        bgKey:
          type: string
          nullable: true
        effectCommand:
          type: string
          nullable: true
        bgmKey:
          type: string
          nullable: true
        charId:
          type: string
          nullable: true
        expression:
          type: string
          nullable: true
      required:
        - id
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
